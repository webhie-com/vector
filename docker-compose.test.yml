services:
  # Unit tests
  test-unit:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
    command: ["bun", "test", "--coverage"]
    networks:
      - test-network

  # E2E tests
  test-e2e:
    build:
      context: .
      dockerfile: Dockerfile
      target: e2e-test
    environment:
      NODE_ENV: test
    command: ["bun", "test", "tests/e2e/e2e.test.ts"]
    networks:
      - test-network

  # Load tests
  test-load:
    build:
      context: .
      dockerfile: Dockerfile
      target: load-test
    environment:
      NODE_ENV: test
      TEST_SERVER_URL: http://test-server:3004
    command: ["bun", "test", "tests/e2e/load.test.ts"]
    networks:
      - test-network
    depends_on:
      test-server:
        condition: service_healthy

  # Soak tests
  test-soak:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      TEST_SERVER_URL: http://test-server:3004
    command: ["bun", "test", "tests/e2e/soak.test.ts"]
    networks:
      - test-network
    depends_on:
      test-server:
        condition: service_healthy

  # Benchmark tests (spawns its own server internally — no test-server dependency)
  test-benchmark:
    build:
      context: .
      dockerfile: Dockerfile
      target: benchmark
    environment:
      NODE_ENV: test
    command: ["bun", "run", "tests/e2e/benchmark.test.ts"]
    networks:
      - test-network
    volumes:
      - ./benchmark-results:/app/benchmark-results

  # Test server (shared by load and soak tests)
  test-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      PORT: 3004
    command: ["bun", "run", "tests/e2e/test-server-process.ts"]
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # All tests runner
  test-all:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      TEST_SERVER_URL: http://test-server:3004
    command: |
      sh -c "
        echo 'Running Unit Tests...' &&
        bun test --coverage &&
        echo '\nRunning E2E Tests...' &&
        bun test tests/e2e/e2e.test.ts &&
        echo '\nRunning Load Tests...' &&
        bun test tests/e2e/load.test.ts &&
        echo '\nRunning Soak Tests...' &&
        bun test tests/e2e/soak.test.ts &&
        echo '\nRunning Benchmarks...' &&
        bun run tests/e2e/benchmark.test.ts &&
        echo '\nAll tests completed!'
      "
    networks:
      - test-network
    volumes:
      - ./test-results:/app/test-results
      - ./coverage:/app/coverage
      - ./benchmark-results:/app/benchmark-results
    depends_on:
      test-server:
        condition: service_healthy

networks:
  test-network:
    driver: bridge
